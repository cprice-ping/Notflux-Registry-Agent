name: CI

on:
  push:
  pull_request:

jobs:
  test:
    name: test (${{ matrix.name }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: bridge
            reqs: mcp/requirements.txt
            tests: tests/test_mcp_validators.py
          - name: registry
            reqs: registry_service/requirements.txt
            tests: tests/test_registry_pip.py
          - name: agent
            reqs: agent/requirements.txt
            tests: tests/test_agent_token_exchange.py
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: registry_pip
          POSTGRES_PASSWORD: registry_pip
          POSTGRES_DB: registry
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql+asyncpg://registry_pip:registry_pip@localhost:5432/registry
      SPICEDB_ENDPOINT: http://localhost:8443
      SPICEDB_API_KEY: test-spicedb-key
      MCP_API_KEY: test-mcp-key
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt
          pip install -r ${{ matrix.reqs }}
      - name: Syntax check
        run: python -m compileall agent mcp registry_service
      - name: Run tests
        run: pytest -q ${{ matrix.tests }}

  docker:
    name: docker build (${{ matrix.ctx }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        ctx: [agent, mcp, registry_service, frontend]
    steps:
      - uses: actions/checkout@v4
      - name: Build ${{ matrix.ctx }} image
        run: docker build -t notflux-${{ matrix.ctx }}:ci ./${{ matrix.ctx }}
