---
# k8s/registry-pip-postgres.yaml
#
# Dedicated PostgreSQL for Registry PIP.
#
# Creates:
#   - Secret: registry-pip-postgres-secrets (username/password)
#   - Service: registry-postgres (ClusterIP)
#   - StatefulSet: registry-postgres (1 replica + PVC)
#
# Connection string for registry-pip:
#   postgresql+asyncpg://registry_pip:<password>@registry-postgres.ping-devops-cprice.svc.cluster.local:5432/registry

apiVersion: v1
kind: Secret
metadata:
  name: registry-pip-postgres-secrets
  namespace: ping-devops-cprice
type: Opaque
stringData:
  POSTGRES_USER: registry_pip
  POSTGRES_PASSWORD: change-me-now
  POSTGRES_DB: registry

---
apiVersion: v1
kind: Service
metadata:
  name: registry-postgres
  namespace: ping-devops-cprice
  labels:
    app.kubernetes.io/name: registry-postgres
    app.kubernetes.io/component: database
    app.kubernetes.io/part-of: notflux-registry
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: registry-postgres
    app.kubernetes.io/component: database
  ports:
    - name: postgres
      port: 5432
      targetPort: postgres
      protocol: TCP

---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: registry-postgres
  namespace: ping-devops-cprice
  labels:
    app.kubernetes.io/name: registry-postgres
    app.kubernetes.io/component: database
    app.kubernetes.io/part-of: notflux-registry
spec:
  serviceName: registry-postgres
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: registry-postgres
      app.kubernetes.io/component: database
  template:
    metadata:
      labels:
        app.kubernetes.io/name: registry-postgres
        app.kubernetes.io/component: database
        app.kubernetes.io/part-of: notflux-registry
    spec:
      terminationGracePeriodSeconds: 30
      containers:
        - name: postgres
          image: postgres:16
          imagePullPolicy: IfNotPresent
          ports:
            - name: postgres
              containerPort: 5432
              protocol: TCP
          env:
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: registry-pip-postgres-secrets
                  key: POSTGRES_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: registry-pip-postgres-secrets
                  key: POSTGRES_PASSWORD
            - name: POSTGRES_DB
              valueFrom:
                secretKeyRef:
                  name: registry-pip-postgres-secrets
                  key: POSTGRES_DB
            # Use a subdirectory because the PVC mount root may contain
            # lost+found, which makes initdb fail on first boot.
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          readinessProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - pg_isready -U "$POSTGRES_USER" -d "$POSTGRES_DB"
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - pg_isready -U "$POSTGRES_USER" -d "$POSTGRES_DB"
            initialDelaySeconds: 20
            periodSeconds: 15
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 10Gi
