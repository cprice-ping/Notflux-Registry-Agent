---
# k8s/mcp-bridge.yaml
#
# Deploys the SpiceDB MCP Bridge – a FastMCP server that exposes SpiceDB
# permission management as MCP tools over streamable HTTP transport.
#
# Remote agents (e.g. Google Vertex AI Agent Builder) connect to:
#   https://notflux-registry.ping-devops.com/mcp
#
# The bridge sits inside the cluster and talks to the SpiceDB ClusterIP
# service, so SpiceDB itself is never directly exposed to the internet.
#
# Prerequisites:
#   1. Build and push the container image from mcp/Dockerfile:
#        docker build -t <YOUR_REGISTRY>/spicedb-mcp-bridge:latest ./mcp
#        (mcp/ is at the repo root)
#        docker push <YOUR_REGISTRY>/spicedb-mcp-bridge:latest
#   2. Update the `image:` field in the Deployment below.
#   3. Ensure k8s/secrets.yaml has been applied (provides the API keys).
#
# Apply with:
#   kubectl apply -f k8s/mcp-bridge.yaml
#

###############################################################################
# Deployment
###############################################################################
apiVersion: apps/v1
kind: Deployment
metadata:
  name: spicedb-mcp-bridge
  namespace: ping-devops-cprice
  labels:
    app.kubernetes.io/name: spicedb-mcp-bridge
    app.kubernetes.io/component: mcp-server
    app.kubernetes.io/part-of: notflux-registry
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: spicedb-mcp-bridge
      app.kubernetes.io/component: mcp-server
  template:
    metadata:
      labels:
        app.kubernetes.io/name: spicedb-mcp-bridge
        app.kubernetes.io/component: mcp-server
        app.kubernetes.io/part-of: notflux-registry
    spec:
      terminationGracePeriodSeconds: 15
      containers:
        - name: mcp-bridge
          image: docker.io/pricecs/spicedb-mcp-bridge:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8000
              protocol: TCP
          env:
            # Internal ClusterIP URL – plain HTTP because SpiceDB runs --http-no-tls
            - name: SPICEDB_ENDPOINT
              value: "http://spicedb.ping-devops-cprice.svc.cluster.local:8443"
            # SpiceDB preshared key – pulled from the existing secret
            - name: SPICEDB_API_KEY
              valueFrom:
                secretKeyRef:
                  name: spicedb-preshared-key
                  key: presharedKey
            # Bearer token that Google Agent (or any remote caller) must send.
            # Stored as a separate key in the same secret.
            - name: MCP_API_KEY
              valueFrom:
                secretKeyRef:
                  name: spicedb-preshared-key
                  key: mcpApiKey
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests:
              cpu: "50m"
              memory: "128Mi"
            limits:
              cpu: "200m"
              memory: "256Mi"
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false   # uvicorn writes temp files
            runAsNonRoot: true
            runAsUser: 1000
            capabilities:
              drop:
                - ALL
      securityContext:
        fsGroup: 1000

---
###############################################################################
# Service
###############################################################################
apiVersion: v1
kind: Service
metadata:
  name: spicedb-mcp-bridge
  namespace: ping-devops-cprice
  labels:
    app.kubernetes.io/name: spicedb-mcp-bridge
    app.kubernetes.io/component: mcp-server
    app.kubernetes.io/part-of: notflux-registry
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: spicedb-mcp-bridge
    app.kubernetes.io/component: mcp-server
  ports:
    - name: http
      port: 8000
      targetPort: http
      protocol: TCP

---
###############################################################################
# Ingress – /mcp path on the existing notflux-registry hostname
#
# nginx-ingress merges path rules across Ingress resources for the same host.
# The more-specific /mcp prefix takes precedence over the / rule in
# deployment.yaml that routes to SpiceDB's HTTP REST API.
#
# Google Agent connection details:
#   MCP endpoint:   https://notflux-registry.ping-devops.com/mcp
#   Auth header:    Authorization: Bearer <mcpApiKey from secret>
#   Transport:      streamable-http (MCP 2025-03-26 spec)
###############################################################################
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: spicedb-mcp-bridge
  namespace: ping-devops-cprice
  labels:
    app.kubernetes.io/name: spicedb-mcp-bridge
    app.kubernetes.io/component: mcp-server
    app.kubernetes.io/part-of: notflux-registry
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    cert-manager.io/cluster-issuer: letsencrypt-ping-cloud
    # MCP uses long-lived SSE streams for server-initiated messages.
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
spec:
  ingressClassName: nginx-public
  rules:
    - host: notflux-registry-mcp.ping-devops.com
      http:
        paths:
          - path: /mcp
            pathType: Prefix
            backend:
              service:
                name: spicedb-mcp-bridge
                port:
                  name: http
  tls:
    - hosts:
        - notflux-registry-mcp.ping-devops.com
      secretName: notflux-registry-mcp-tls
