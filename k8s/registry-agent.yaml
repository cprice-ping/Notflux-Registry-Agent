---
# k8s/registry-agent.yaml
#
# Registry Governor AG-UI FastAPI server.
# Runs ag_ui_adk wrapping the ADK LlmAgent, exposing the AG-UI protocol
# so the Next.js frontend (CopilotKit) gets full HITL, thinking steps,
# and generative relationship UI.
#
# Prerequisites:
#   1. Build and push the image:
#        docker build -t docker.io/pricecs/registry-governor:latest ./agent
#        docker push docker.io/pricecs/registry-governor:latest
#
#   2. Create the secret (see README "Configuration" for the full key list —
#      the token exchange now runs through DaVinci, so PINGONE_CLIENT_ID/SECRET
#      and PINGONE_MCP_SCOPE are no longer required):
#        kubectl create secret generic registry-agent-secrets \
#          --namespace ping-devops-cprice \
#          --from-literal=GOOGLE_API_KEY="<gemini-api-key>" \
#          --from-literal=MCP_BRIDGE_URL="<gateway-mcp-url>" \
#          --from-literal=PINGONE_AGENT_AUDIENCE="<aud-claim>" \
#          --from-literal=DAVINCI_POLICY_URL="<davinci-flow-start-url>" \
#          --from-literal=DAVINCI_POLICY_API_KEY="<davinci-flow-api-key>" \
#          --from-literal=REGISTRY_PIP_URL="<pip-mcp-url>" \
#          --from-literal=REGISTRY_PIP_API_KEY="<pip-mcp-api-key>"
#
#   3. kubectl apply -f k8s/registry-agent.yaml

###############################################################################
# ServiceAccount — sovereign identity for the agent loop.
# The kubelet projects a short-lived OIDC token (audience: davinci-sts) into
# the pod filesystem; the agent presents it to PingOne as a JWT Bearer
# assertion (RFC 7523) instead of a static client secret.
###############################################################################
apiVersion: v1
kind: ServiceAccount
metadata:
  name: notflux-registry-agent
  namespace: ping-devops-cprice
  labels:
    app.kubernetes.io/name: registry-agent
    app.kubernetes.io/component: agent
    app.kubernetes.io/part-of: notflux-registry
  annotations:
    # If you later enable IRSA (IAM Roles for Service Accounts) on EKS, add:
    # eks.amazonaws.com/role-arn: arn:aws:iam::<account-id>:role/<role-name>
    pingone.com/purpose: "notflux-registry-agent token exchange"
automountServiceAccountToken: false  # we use an explicit projected token below

---
###############################################################################
# Deployment
###############################################################################
apiVersion: apps/v1
kind: Deployment
metadata:
  name: registry-agent
  namespace: ping-devops-cprice
  labels:
    app.kubernetes.io/name: registry-agent
    app.kubernetes.io/component: agent
    app.kubernetes.io/part-of: notflux-registry
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: registry-agent
      app.kubernetes.io/component: agent
  template:
    metadata:
      labels:
        app.kubernetes.io/name: registry-agent
        app.kubernetes.io/component: agent
        app.kubernetes.io/part-of: notflux-registry
    spec:
      terminationGracePeriodSeconds: 30
      # Attach the sovereign SA identity to every pod replica.
      serviceAccountName: notflux-registry-agent
      volumes:
        # Kubelet auto-mints a short-lived OIDC token (audience: davinci-sts).
        # Rotated automatically before expiry — no secret management needed.
        - name: davinci-sts-token
          projected:
            sources:
              - serviceAccountToken:
                  audience: davinci-sts
                  expirationSeconds: 3600
                  path: davinci-token
      containers:
        - name: agent
          image: docker.io/pricecs/registry-governor:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8000
              protocol: TCP
          env:
            # ADK uses GOOGLE_API_KEY for direct Gemini API access.
            # No GOOGLE_CLOUD_PROJECT / Vertex needed — cluster is on AWS.
            - name: GOOGLE_API_KEY
              valueFrom:
                secretKeyRef:
                  name: registry-agent-secrets
                  key: GOOGLE_API_KEY
            - name: MCP_BRIDGE_URL
              valueFrom:
                secretKeyRef:
                  name: registry-agent-secrets
                  key: MCP_BRIDGE_URL
            # Expected aud on the inbound agent_token — a cheap pre-filter before
            # the DaVinci round-trip. Real signature validation happens at DaVinci
            # and the gateway, not here. (The legacy PINGONE_ENV_ID / CLIENT_ID /
            # CLIENT_SECRET / MCP_SCOPE vars are no longer used now that the
            # exchange runs through the DaVinci flow.)
            - name: PINGONE_AGENT_AUDIENCE
              valueFrom:
                secretKeyRef:
                  name: registry-agent-secrets
                  key: PINGONE_AGENT_AUDIENCE
            # Weather MCP server — same PingGateway, same per-turn token.
            - name: WEATHER_MCP_URL
              valueFrom:
                secretKeyRef:
                  name: registry-agent-secrets
                  key: WEATHER_MCP_URL
            # Registry-PIP MCP endpoint — static bearer token, no per-turn exchange.
            - name: REGISTRY_PIP_URL
              valueFrom:
                secretKeyRef:
                  name: registry-agent-secrets
                  key: REGISTRY_PIP_URL
            - name: REGISTRY_PIP_API_KEY
              valueFrom:
                secretKeyRef:
                  name: registry-agent-secrets
                  key: REGISTRY_PIP_API_KEY
            # Path to the projected SA token — read at runtime for JWT Bearer assertion.
            - name: PINGONE_SA_TOKEN_PATH
              value: /var/run/secrets/tokens/davinci-token
            # DaVinci policy execution URL + API key for the token exchange flow.
            - name: DAVINCI_POLICY_URL
              valueFrom:
                secretKeyRef:
                  name: registry-agent-secrets
                  key: DAVINCI_POLICY_URL
            - name: DAVINCI_POLICY_API_KEY
              valueFrom:
                secretKeyRef:
                  name: registry-agent-secrets
                  key: DAVINCI_POLICY_API_KEY
          volumeMounts:
            - name: davinci-sts-token
              mountPath: /var/run/secrets/tokens
              readOnly: true
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 20
            periodSeconds: 20
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "1000m"
              memory: "1Gi"
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            runAsUser: 1000
            capabilities:
              drop:
                - ALL

---
###############################################################################
# Service
###############################################################################
apiVersion: v1
kind: Service
metadata:
  name: registry-agent
  namespace: ping-devops-cprice
  labels:
    app.kubernetes.io/name: registry-agent
    app.kubernetes.io/component: agent
    app.kubernetes.io/part-of: notflux-registry
spec:
  selector:
    app.kubernetes.io/name: registry-agent
    app.kubernetes.io/component: agent
  ports:
    - name: http
      port: 8000
      targetPort: http
      protocol: TCP

# NOTE: No Ingress is defined for the agent. The AG-UI endpoint performs
# privileged SpiceDB mutations and is reached only via the in-cluster
# ClusterIP Service (the frontend's /api/copilotkit proxy talks to it).
# Exposing it publicly would put the Gemini-backed agent loop on the open
# internet behind only a bearer token. If external access is ever required,
# front it with the gateway rather than a public nginx Ingress, and apply
# that Ingress manually.
